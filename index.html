<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#ff5fb2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Y2K DOLLZ" />
  <link rel="manifest" href="app.webmanifest" />
  <title>Y2K DOllZ</title>

  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">Y2K doll maker</p>
        <h1>Y2K DOLLZ</h1>
        <p class="subtitle">
          Click, Pick, Style, and Save
        </p>
      </div>

      <div class="hero-actions">
        <button id="saveBtn" class="primary">Save doll</button>
        <button id="randomBtn">Randomize</button>
        <button id="clearCategoryBtn">Clear</button>
      </div>
    </header>

    <main class="layout">
      <section class="preview-panel">
        <div class="preview-card">
          <div class="preview-header">
            <h2>Your doll</h2>
            <p id="statusText">Pick a category and click an item ✨</p>
          </div>

          <div class="doll-stage-wrap">
            <div class="sparkle sparkle-a">✦</div>
            <div class="sparkle sparkle-b">♥</div>
            <div class="sparkle sparkle-c">✦</div>

            <div id="dollStage" class="doll-stage">
              <img id="layer-body" class="layer" alt="" />
              <img id="layer-bottoms" class="layer" alt="" />
              <img id="layer-tops" class="layer" alt="" />
              <img id="layer-dresses" class="layer" alt="" />
              <img id="layer-hair" class="layer" alt="" />
              <img id="layer-accessories" class="layer" alt="" />
            </div>
          </div>

          <div class="editor-controls">
  <label class="editor-scale">
    <span>Scale</span>
    <input id="scaleSlider" type="range" min="40" max="220" value="100" />
    <strong id="scaleValue">100%</strong>
  </label>

  <div class="editor-buttons">
    <button id="flipBtn" type="button">Flip</button>
    <button id="resetLayerBtn" type="button">Reset item</button>
  </div>
</div>
        </div>
      </section>

      <section class="controls-panel">
        <div class="tabs" id="tabs"></div>

        <div class="toolbar">
          <div>
            <h2 id="categoryTitle">Bodies</h2>
            <p id="categoryHint">Choose an item to place it on your doll.</p>
          </div>

          <input id="searchInput" type="search" placeholder="Search this category" />
        </div>

        <div id="thumbGrid" class="thumb-grid"></div>
      </section>
    </main>
  </div>

  <script src="manifest.js?v=5"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
